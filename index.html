<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RappelSMS - Brutal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #fdf5e6; /* Blanc cassé façon papier brut */
            color: #000;
            font-family: 'Space Mono', monospace;
        }
        
        /* Typo massive pour les titres */
        h1, h2, .font-black {
            font-family: 'Archivo Black', sans-serif;
            text-transform: uppercase;
        }

        /* L'ADN du Néo-brutalisme */
        .brutal-border {
            border: 4px solid #000;
        }
        
        .brutal-shadow {
            box-shadow: 8px 8px 0px 0px #000;
            transition: all 0.1s ease-in-out;
        }
        
        .brutal-shadow:hover {
            transform: translate(-2px, -2px);
            box-shadow: 10px 10px 0px 0px #000;
        }
        
        /* L'effet "bouton physique" ultra satisfaisant */
        .brutal-shadow:active {
            transform: translate(8px, 8px);
            box-shadow: 0px 0px 0px 0px #000;
        }

        /* Palette qui tape */
        .bg-brutal-yellow { background-color: #fbff00; }
        .bg-brutal-blue { background-color: #0044ff; color: white; }
        .bg-brutal-pink { background-color: #ff00ea; color: white; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4 sm:p-8 selection:bg-black selection:text-white">

    <div class="mb-8 md:mb-12 brutal-border bg-white px-6 py-3 brutal-shadow transform -rotate-2">
        <h1 class="text-3xl md:text-5xl tracking-tighter">Rappel<span class="text-[#0044ff]">SMS</span></h1>
    </div>

    <main class="w-full max-w-4xl bg-white brutal-border brutal-shadow p-6 md:p-12 flex flex-col items-center text-center">
        
        <h2 class="text-4xl md:text-6xl leading-tight mb-6">
            La communication, <br>
            <span class="bg-brutal-yellow px-4 border-y-4 border-black">sans bullshit.</span>
        </h2>
        
        <p class="text-lg md:text-xl font-bold mb-10 max-w-2xl">
            UNE NOUVELLE ÈRE SE PRÉPARE. LE DÉPLOIEMENT EST PRÉVU POUR <span class="bg-black text-white px-2">JUIN 2026</span>.
        </p>

        <div id="countdown" class="grid grid-cols-2 md:grid-cols-4 gap-4 md:gap-6 w-full mb-12">
            <div class="brutal-border bg-brutal-pink p-4 flex flex-col items-center justify-center brutal-shadow transform rotate-1">
                <span id="days" class="text-5xl md:text-6xl font-black">00</span>
                <span class="text-sm font-bold uppercase tracking-widest mt-2 text-black">Jours</span>
            </div>
            <div class="brutal-border bg-white p-4 flex flex-col items-center justify-center brutal-shadow transform -rotate-1">
                <span id="hours" class="text-5xl md:text-6xl font-black">00</span>
                <span class="text-sm font-bold uppercase tracking-widest mt-2">Heures</span>
            </div>
            <div class="brutal-border bg-white p-4 flex flex-col items-center justify-center brutal-shadow transform rotate-1">
                <span id="minutes" class="text-5xl md:text-6xl font-black">00</span>
                <span class="text-sm font-bold uppercase tracking-widest mt-2">Minutes</span>
            </div>
            <div class="brutal-border bg-brutal-yellow p-4 flex flex-col items-center justify-center brutal-shadow transform -rotate-1">
                <span id="seconds" class="text-5xl md:text-6xl font-black">00</span>
                <span class="text-sm font-bold uppercase tracking-widest mt-2">Secondes</span>
            </div>
        </div>

        <div class="w-full max-w-2xl">
            <form id="notify-form" class="flex flex-col sm:flex-row gap-4">
                <input type="email" id="email-input" required placeholder="TON EMAIL ICI" 
                    class="flex-grow brutal-border px-6 py-4 bg-[#fdf5e6] font-bold text-lg placeholder-gray-500 focus:outline-none focus:bg-white focus:ring-0 transition-colors text-center sm:text-left">
                <button type="submit" 
                    class="brutal-border bg-brutal-blue font-black text-xl px-10 py-4 brutal-shadow uppercase whitespace-nowrap">
                    ME PRÉVENIR
                </button>
            </form>
            <div id="form-feedback" class="mt-4 font-bold uppercase tracking-widest h-6 text-[#0044ff]"></div>
        </div>
        
    </main>

    <footer class="mt-12 font-bold uppercase text-sm tracking-widest">
        © 2026 RappelSMS. <span class="bg-black text-white px-1">STAY TUNED.</span>
    </footer>

    <script>
        // LOGIQUE DU COMPTE À REBOURS (Clean, sans erreur)
        (function() {
            // Cible : 1er Juin 2026
            const targetDate = new Date("Jun 1, 2026 00:00:00").getTime();

            const daysEl = document.getElementById("days");
            const hoursEl = document.getElementById("hours");
            const minutesEl = document.getElementById("minutes");
            const secondsEl = document.getElementById("seconds");

            setInterval(() => {
                const now = new Date().getTime();
                const distance = targetDate - now;

                if (distance < 0) return; // Si c'est lancé, on arrête le script

                const days = Math.floor(distance / (1000 * 60 * 60 * 24));
                const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((distance % (1000 * 60)) / 1000);

                daysEl.textContent = days.toString().padStart(2, '0');
                hoursEl.textContent = hours.toString().padStart(2, '0');
                minutesEl.textContent = minutes.toString().padStart(2, '0');
                secondsEl.textContent = seconds.toString().padStart(2, '0');
            }, 1000);
        })();

        // LOGIQUE DU FORMULAIRE
        document.getElementById("notify-form").addEventListener("submit", function(e) {
            e.preventDefault();
            const feedbackEl = document.getElementById("form-feedback");
            feedbackEl.textContent = "✓ EMAIL ENREGISTRÉ DANS LA BASE.";
            
            document.getElementById("email-input").value = "";
            
            setTimeout(() => {
                feedbackEl.textContent = "";
            }, 4000);
        });
    </script>
</body>
</html>
